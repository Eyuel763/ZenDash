<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDash</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="login-container">
        <h1>ZenDash</h1>
        <input type="text" id="name-input" placeholder="What is your name?">
        <button id="login-btn">Enter</button>
    </div>
    <div id="dashboard" class="hidden">
        <h1>ZenDash</h1>
        <h1 id="clock">00:00:00</h1>

        <h2 id="greeting">
            <span id="greeting-text">Hello</span>, <span id="user-name"></span>
        </h2>

        <form id = "todo-form">
            <input id = "todo-input" type="text" placeholder="Enter a new task" >
            <button type="submit">Add Task</button>
        </form>

        <div class="filter-buttons">
            <button id="filter-all">All</button>
            <button id="filter-active">Active</button>
            <button id="filter-completed">Completed</button>
        </div>
        <ul id="todo-list"></ul>

        <div id="weather">
            <span id="temp"></span>
            <span id="city"></span>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
